name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "Hosted URL that should open inside APK (e.g. https://your-domain.com)"
        required: true
        default: "https://example.com"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"
          cache-disabled: true

      - name: Install Android SDK Components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build Debug APK
        working-directory: android-webview-app
        run: |
          gradle --no-daemon assembleDebug -PAPP_URL="${{ github.event.inputs.app_url }}"

      - name: Verify APK Path
        run: |
          ls -lah android-webview-app/app/build/outputs/apk/debug || true
          test -f android-webview-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crypto-app-debug-apk
          path: android-webview-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
